<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hackathon learning path illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#eef7f1" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f8cff" />
      <stop offset="100%" stop-color="#21b573" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect x="10" y="10" width="1180" height="300" rx="20" fill="url(#bg)" />
  <path d="M120 200 C 260 140, 420 250, 560 180 C 700 110, 860 220, 1030 130" fill="none" stroke="url(#line)" stroke-width="10" stroke-linecap="round" />

  <g filter="url(#shadow)">
    <circle cx="120" cy="200" r="30" fill="#4f8cff" />
    <circle cx="340" cy="176" r="30" fill="#4f8cff" />
    <circle cx="560" cy="180" r="30" fill="#21b573" />
    <circle cx="790" cy="166" r="30" fill="#21b573" />
    <circle cx="1030" cy="130" r="30" fill="#f4a11a" />
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#13324d" text-anchor="middle">
    <text x="120" y="255">00 Basics</text>
    <text x="340" y="231">01 Turtle</text>
    <text x="560" y="235">02 Static</text>
    <text x="790" y="221">03 Moving</text>
    <text x="1030" y="185">04 Games</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    <text x="120" y="202">1</text>
    <text x="340" y="178">2</text>
    <text x="560" y="182">3</text>
    <text x="790" y="168">4</text>
    <text x="1030" y="132">5</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#35516a" text-anchor="middle">
    <text x="600" y="300">Start simple, build visuals, make motion, then create games.</text>
  </g>
</svg>
